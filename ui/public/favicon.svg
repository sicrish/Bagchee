<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a3a5c"/>
  <!-- Book pages (open book shape) -->
  <rect x="10" y="18" width="20" height="28" rx="2" fill="#ffffff" opacity="0.15"/>
  <rect x="34" y="18" width="20" height="28" rx="2" fill="#ffffff" opacity="0.15"/>
  <line x1="32" y1="18" x2="32" y2="46" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Letter B -->
  <text x="32" y="43" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">B</text>
  <!-- Accent bar at bottom -->
  <rect x="18" y="50" width="28" height="3" rx="1.5" fill="#f0a500"/>
</svg>

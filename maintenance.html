<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Unavailable — Bagchee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #f9f5f0;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e0d9d0;
      border-radius: 4px;
      max-width: 520px;
      width: 100%;
      padding: 56px 48px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .logo {
      font-family: 'Georgia', serif;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #7a3b2e;
      margin-bottom: 40px;
    }
    .divider {
      width: 48px;
      height: 2px;
      background: #7a3b2e;
      margin: 0 auto 32px;
    }
    h1 {
      font-size: 18px;
      font-weight: normal;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #2c2c2c;
      margin-bottom: 20px;
    }
    p {
      font-size: 15px;
      line-height: 1.8;
      color: #5a5a5a;
      margin-bottom: 16px;
    }
    .contact {
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid #e0d9d0;
      font-size: 13px;
      color: #888;
    }
    .contact a {
      color: #7a3b2e;
      text-decoration: none;
    }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Bagchee</div>
    <div class="divider"></div>
    <h1>Service Temporarily Unavailable</h1>
    <p>This website is currently undergoing scheduled maintenance and is temporarily unavailable.</p>
    <p>We apologise for the inconvenience. Please check back shortly.</p>
    <div class="contact">
      For urgent enquiries, contact us at
      <a href="mailto:info@bagchee.com">info@bagchee.com</a>
    </div>
  </div>
</body>
</html>
